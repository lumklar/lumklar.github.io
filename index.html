<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>个人主页 · 首页</title>
    <!-- 使用优雅的 Inter 字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <style>
        /* 全局重置与基础 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #faf9f8;
            color: #1e1e1e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            line-height: 1.5;
        }

        /* 主卡片 — 干净、柔和、微阴影 */
        .card {
            max-width: 680px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            padding: 3rem 2.5rem;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.04), 0 4px 12px rgba(0, 0, 0, 0.02);
            transition: box-shadow 0.25s ease;
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .card:hover {
            box-shadow: 0 20px 48px rgba(0, 0, 0, 0.06);
        }

        /* 头像 / 标识 */
        .avatar {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .avatar-initials {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(145deg, #2563eb, #1d4ed8);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.75rem;
            letter-spacing: 0.02em;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.20);
        }

        .avatar-info h1 {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #0a0a0a;
            line-height: 1.2;
        }

        .avatar-info .tagline {
            font-size: 1rem;
            color: #5e5e5e;
            font-weight: 400;
            margin-top: 0.1rem;
        }

        /* 分隔装饰 */
        .divider {
            margin: 1.75rem 0 1.5rem 0;
            border: 0;
            height: 1px;
            background: linear-gradient(to right, #eaeaea, transparent);
        }

        /* 描述文字 */
        .bio {
            font-size: 1.05rem;
            color: #2c2c2c;
            margin-bottom: 2.25rem;
            font-weight: 400;
            letter-spacing: -0.01em;
            line-height: 1.6;
        }

        .bio strong {
            font-weight: 600;
            color: #0a0a0a;
        }

        /* 项目卡片链接 — 突出、清晰 */
        .project-link {
            display: block;
            background: #f6f8fc;
            border-radius: 20px;
            padding: 1.5rem 1.75rem;
            text-decoration: none;
            color: inherit;
            border: 1px solid #eef1f6;
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
            margin-bottom: 1.5rem;
        }

        .project-link:hover {
            background: #f0f4fe;
            border-color: #b9c8f0;
            transform: translateY(-2px);
        }

        .project-link:active {
            transform: translateY(0);
        }

        .project-link .project-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.4rem;
        }

        .project-link .project-icon {
            font-size: 1.6rem;
            line-height: 1;
        }

        .project-link .project-name {
            font-weight: 600;
            font-size: 1.25rem;
            color: #0a0a0a;
            letter-spacing: -0.01em;
        }

        .project-link .project-name code {
            background: #e8edf6;
            padding: 0.15rem 0.6rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #1d4ed8;
            font-family: 'Inter', monospace;
        }

        .project-link .project-desc {
            color: #3d3d3d;
            font-size: 0.98rem;
            margin-top: 0.25rem;
            font-weight: 400;
        }

        .project-link .project-arrow {
            margin-left: auto;
            color: #6b7a93;
            font-size: 1.2rem;
            transition: transform 0.2s ease;
        }

        .project-link:hover .project-arrow {
            transform: translateX(4px);
        }

        /* 底部社交/状态 */
        .footer-meta {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-top: 2rem;
            padding-top: 1.25rem;
            border-top: 1px solid #f0f0f0;
            font-size: 0.9rem;
            color: #6b6b6b;
        }

        .footer-meta .status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.15);
        }

        .footer-links {
            display: flex;
            gap: 1.5rem;
        }

        .footer-links a {
            color: #5a5a5a;
            text-decoration: none;
            font-weight: 450;
            transition: color 0.2s ease;
            border-bottom: 1px solid transparent;
        }

        .footer-links a:hover {
            color: #1d4ed8;
            border-bottom-color: #1d4ed8;
        }

        /* 响应式 */
        @media (max-width: 500px) {
            .card {
                padding: 2rem 1.25rem;
                border-radius: 24px;
            }

            .avatar-initials {
                width: 52px;
                height: 52px;
                font-size: 1.4rem;
            }

            .avatar-info h1 {
                font-size: 1.4rem;
            }

            .project-link {
                padding: 1.25rem 1.25rem;
            }

            .footer-meta {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.75rem;
            }

            .footer-links {
                gap: 1.25rem;
            }
        }

        @media (max-width: 380px) {
            .project-link .project-header {
                flex-wrap: wrap;
            }
            .project-link .project-arrow {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- 头像 + 名称 -->
        <div class="avatar">
            <div class="avatar-initials">👤</div>
            <div class="avatar-info">
                <h1>你好，我是 <span style="color:#1d4ed8;">Lumklar</span></h1>
                <div class="tagline">开发者 · 创造者 · 终身学习</div>
            </div>
        </div>

        <hr class="divider" />

        <!-- 个人简介 -->
        <p class="bio">
            欢迎来到我的个人小站 👋 我热衷于构建简洁、实用的工具与界面。
            这里是我的数字花园，记录想法、项目与探索。
        </p>

        <!-- ★ 核心：跳转到相对路径 SortRss 的项目链接 -->
        <a href="./SortRss/" class="project-link" aria-label="前往 SortRss 项目">
            <div class="project-header">
                <span class="project-icon">📡</span>
                <span class="project-name">
                    <code>SortRss</code>
                </span>
                <span class="project-arrow">→</span>
            </div>
            <div class="project-desc">
                智能 RSS 订阅源聚合、排序与过滤工具 · 让信息流更清爽
            </div>
        </a>

        <!-- 也可以额外加一个纯文本的备用链接，但上面的卡片已经足够 -->
        <!-- 如果想明确显示相对路径，可加一小行提示（可选） -->
        <div style="font-size:0.85rem; color:#8a8a8a; margin-top:-0.5rem; margin-bottom:0.25rem; padding-left:0.25rem;">
            <span>🔗 相对路径：</span>
            <code style="background:#f2f2f2; padding:0.1rem 0.5rem; border-radius:6px; font-size:0.8rem;">./SortRss/</code>
        </div>

        <!-- 底部信息 -->
        <div class="footer-meta">
            <div class="status">
                <span class="status-dot"></span>
                <span>在线 · 开放合作</span>
            </div>
            <div class="footer-links">
                <a href="https://github.com/lumklar" aria-label="GitHub">GitHub</a>
                <a href="#" aria-label="博客">博客</a>
                <a href="#" aria-label="关于">关于</a>
            </div>
        </div>

    </div>

</body>
</html>
